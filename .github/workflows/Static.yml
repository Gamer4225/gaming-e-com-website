name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: gaming-e-com-website/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: gaming-e-com-website
      - name: Build
        run: npm run build
        working-directory: gaming-e-com-website
      - name: Deploy to repo root
        run: |
          cp gaming-e-com-website/dist/* . 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy: auto-built site [skip ci]"
            git push
          fi
